<!DOCTYPE html>
<html lang="en">
  <head>
    <script defer src="./script.js"></script>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div id="win-count">
      <div>
        ❌<br />
        <span id="x">0</span>
      </div>
      <div>⭕<br /><span id="o">0</span></div>
    </div>
    <table cellspacing="0">
      <tr>
        <td
          class="cellClick empty top-cell left-side"
          onclick="gameMovesX(1)"
          id="1"
        ></td>
        <td class="cellClick mid" onclick="gameMovesX(2)" id="2"></td>
        <td
          class="cellClick empty top-cell right-side"
          onclick="gameMovesX(3)"
          id="3"
        ></td>
      </tr>
      <tr>
        <td class="cellClick" onclick="gameMovesX(4)" id="4"></td>
        <td class="cellClick mid" onclick="gameMovesX(5)" id="5"></td>
        <td class="cellClick" onclick="gameMovesX(6)" id="6"></td>
      </tr>
      <tr>
        <td class="cellClick bottom" onclick="gameMovesX(7)" id="7"></td>
        <td class="cellClick bottom mid" onclick="gameMovesX(8)" id="8"></td>
        <td class="cellClick bottom" onclick="gameMovesX(9)" id="9"></td>
      </tr>
    </table>
    <br />
    <button>Reset</button>
  </body>
</html>
